{% extends "base.html" %}
{% block title %}Forgot Password - AI Career Prep{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Forgot Password</h2>
                <p class="text-center text-muted mb-4">Enter your email address and we'll generate a reset link for you.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Generate Reset Link</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <a href="{{ url_for('login') }}" class="text-decoration-none">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
