{% extends "base.html" %}

{% block title %}Mock Interview - AI Career Prep{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card card-glass p-5 shadow">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <span class="badge bg-primary px-3 py-2 text-uppercase">{{ question.category }}</span>
                    <span class="ms-2 text-muted small">Target: <span class="fw-semibold text-primary">{{ user.desired_role }}</span></span>
                </div>
                <span class="text-muted">Difficulty: <span class="badge {% if question.difficulty == 'Easy' %}bg-success{% elif question.difficulty == 'Medium' %}bg-warning{% else %}bg-danger{% endif %}">{{ question.difficulty }}</span></span>
            </div>

            <div class="question-container mb-5">
                <h3 class="fw-bold mb-4 gradient-text">{{ question.question_text }}</h3>
                <div id="hint-section" class="p-3 rounded border-start border-info border-4" style="display: none; background: rgba(13, 202, 240, 0.05);">
                    <small class="text-info fw-bold">HINT:</small>
                    <p class="mb-0 text-muted italic">{{ question.hint }}</p>
                </div>
            </div>

            <form method="POST" id="interview-form">
                <input type="hidden" name="question_id" value="{{ question.id }}">
                <input type="hidden" name="current_difficulty" value="{{ question.difficulty }}">
                
                <div class="mb-4">
                    <label class="form-label text-muted small">Your Answer</label>
                    <textarea name="user_answer" class="form-control" rows="4" placeholder="Type your answer here..." required></textarea>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">Submit Answer</button>
                    <button type="button" class="btn btn-outline-info" onclick="document.getElementById('hint-section').style.display='block'">Show Hint</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-auto">Exit Session</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
