{% extends "base.html" %}

{% block title %}Login - AI Career Prep{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-glass p-5 shadow">
            <h2 class="text-center mb-4 fw-bold">Welcome <span class="gradient-text">Back</span></h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label text-muted small">Password</label>
                        <a href="{{ url_for('forgot_password') }}" class="text-info text-decoration-none small">Forgot?</a>
                    </div>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted small">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none text-info fw-semibold">Register here</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
