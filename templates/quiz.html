{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card-glass p-5 shadow-lg border-0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Week {{ week }} Quiz</h2>
                <span class="badge bg-primary rounded-pill px-3">{{ questions|length }} Questions</span>
            </div>
            
            <form action="{{ url_for('quiz') }}" method="POST" id="quizForm">
                <input type="hidden" name="week_number" value="{{ week }}">
                {% for q in questions %}
                <div class="quiz-question mb-5 p-4 rounded bg-white shadow-sm border-start border-primary border-4">
                    <h5 class="fw-bold mb-3">Question {{ loop.index }}: {{ q.question_text }}</h5>
                    <div class="options-grid">
                        <div class="form-check mb-2 p-3 border rounded hover-bg">
                            <input class="form-check-input ms-0" type="radio" name="q_{{ q.id }}" id="q{{ q.id }}a" value="A" required>
                            <label class="form-check-label ms-4 w-100" for="q{{ q.id }}a">{{ q.option_a }}</label>
                        </div>
                        <div class="form-check mb-2 p-3 border rounded hover-bg">
                            <input class="form-check-input ms-0" type="radio" name="q_{{ q.id }}" id="q{{ q.id }}b" value="B">
                            <label class="form-check-label ms-4 w-100" for="q{{ q.id }}b">{{ q.option_b }}</label>
                        </div>
                        <div class="form-check mb-2 p-3 border rounded hover-bg">
                            <input class="form-check-input ms-0" type="radio" name="q_{{ q.id }}" id="q{{ q.id }}c" value="C">
                            <label class="form-check-label ms-4 w-100" for="q{{ q.id }}c">{{ q.option_c }}</label>
                        </div>
                        <div class="form-check mb-2 p-3 border rounded hover-bg">
                            <input class="form-check-input ms-0" type="radio" name="q_{{ q.id }}" id="q{{ q.id }}d" value="D">
                            <label class="form-check-label ms-4 w-100" for="q{{ q.id }}d">{{ q.option_d }}</label>
                        </div>
                    </div>
                </div>
                {% endfor %}
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow">Submit Quiz</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .hover-bg:hover {
        background-color: rgba(14, 165, 233, 0.05);
        border-color: var(--sky-blue) !important;
        cursor: pointer;
    }
    .form-check-input:checked + .form-check-label {
        font-weight: 600;
        color: var(--sky-blue);
    }
</style>
{% endblock %}
