{% extends "base.html" %}

{% block title %}Onboarding - AI Career Prep{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card card-glass p-5 shadow">
            <h2 class="text-center mb-4 fw-bold">Set Up Your <span class="gradient-text">Profile</span></h2>
            <p class="text-center text-muted mb-5">Tell us about yourself so we can personalize your experience.</p>

            <form method="POST">
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Age</label>
                        <input type="number" name="age" class="form-control" placeholder="e.g. 21" value="{{ current_user.age or '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Education Level</label>
                        <select name="education_level" class="form-select form-control" required>
                            <option value="" disabled selected>Select Level</option>
                            <option value="School (6-10)" {% if current_user.education_level == 'School (6-10)' %}selected{% endif %}>School Student (6-10)</option>
                            <option value="Intermediate (1st Year)" {% if current_user.education_level == 'Intermediate (1st Year)' %}selected{% endif %}>Intermediate (1st Year)</option>
                            <option value="Intermediate (2nd Year)" {% if current_user.education_level == 'Intermediate (2nd Year)' %}selected{% endif %}>Intermediate (2nd Year)</option>
                            <option value="Diploma (1st Year)" {% if current_user.education_level == 'Diploma (1st Year)' %}selected{% endif %}>Diploma (1st Year)</option>
                            <option value="Diploma (2nd Year)" {% if current_user.education_level == 'Diploma (2nd Year)' %}selected{% endif %}>Diploma (2nd Year)</option>
                            <option value="Diploma (3rd Year)" {% if current_user.education_level == 'Diploma (3rd Year)' %}selected{% endif %}>Diploma (3rd Year)</option>
                            <option value="ITI" {% if current_user.education_level == 'ITI' %}selected{% endif %}>ITI</option>
                            <option value="B.Tech (1st Year)" {% if current_user.education_level == 'B.Tech (1st Year)' %}selected{% endif %}>B.Tech (1st Year)</option>
                            <option value="B.Tech (2nd Year)" {% if current_user.education_level == 'B.Tech (2nd Year)' %}selected{% endif %}>B.Tech (2nd Year)</option>
                            <option value="B.Tech (3rd Year)" {% if current_user.education_level == 'B.Tech (3rd Year)' %}selected{% endif %}>B.Tech (3rd Year)</option>
                            <option value="B.Tech (4th Year)" {% if current_user.education_level == 'B.Tech (4th Year)' %}selected{% endif %}>B.Tech (4th Year)</option>
                            <option value="M.Tech (1st Year)" {% if current_user.education_level == 'M.Tech (1st Year)' %}selected{% endif %}>M.Tech (1st Year)</option>
                            <option value="M.Tech (2nd Year)" {% if current_user.education_level == 'M.Tech (2nd Year)' %}selected{% endif %}>M.Tech (2nd Year)</option>
                            <option value="Job Seeker" {% if current_user.education_level == 'Job Seeker' %}selected{% endif %}>Job Seeker</option>
                            <option value="Professional" {% if current_user.education_level == 'Professional' %}selected{% endif %}>Working Professional</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small">Desired Job Role</label>
                    <input type="text" name="desired_role" class="form-control" placeholder="e.g. Software Engineer" value="{{ current_user.desired_role or '' }}" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Daily Study Hours</label>
                        <input type="number" name="available_time" class="form-control" placeholder="e.g. 4" min="1" max="24" value="{{ current_user.available_time or '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Preparation Duration (Weeks)</label>
                        <input type="number" name="prep_weeks" class="form-control" placeholder="e.g. 4" min="1" max="52" value="{{ current_user.prep_weeks or 1 }}" required>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-2">
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">Save & Generate Roadmap</button>
                    {% if current_user.desired_role %}
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary px-4 py-3 fw-bold">Cancel</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
